name: Featured images

# Renders featured images (Chromium) for drafts that need one, then uploads to GHL.
# Triggered on-demand by the generate function (repository_dispatch) or manually.
on:
  workflow_dispatch:
  repository_dispatch:
    types: [render-featured]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: cd worker && npm install --no-audit --no-fund
      - name: Install Chromium
        run: cd worker && npx playwright install --with-deps chromium
      - name: Render featured images
        run: cd worker && node featured-worker.mjs "${{ github.event.client_payload.post_id }}"
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GHL_API_TOKEN: ${{ secrets.GHL_API_TOKEN }}
